# ─── Root Types ─────────────────────────────────────────────────────────────────

type Query {
  """Retrieve a policy by policy number."""
  policy(policyNumber: String!): Policy

  """List all policies for a policyholder."""
  policies(policyHolderId: String!): [Policy!]!

  """Retrieve a policyholder by ID."""
  policyHolder(id: ID!): PolicyHolder

  """Look up vehicle information by VIN."""
  vehicle(vin: String!): Vehicle

  """Decode a VIN number."""
  decodeVIN(vin: String!): VehicleInfo

  """Retrieve a claim by claim number."""
  claim(claimNumber: String!): Claim

  """List claims for a policy."""
  claims(policyNumber: String!): [Claim!]!

  """Retrieve a body shop by ID."""
  bodyShop(shopId: ID!): BodyShop

  """Search for body shops near a location."""
  bodyShops(zipCode: String, latitude: Decimal, longitude: Decimal, radiusMiles: Int): [BodyShop!]!

  """Retrieve an agent by ID."""
  agent(agentId: String!): Agent

  """Find agents near a location."""
  agentLocator(zipCode: String, latitude: Decimal, longitude: Decimal, radiusMiles: Int): AgentLocator!

  """Request an insurance quote."""
  quote(type: PolicyType!, input: QuoteInput!): QuoteResult!

  """Retrieve Drive and Save details for a driver on an auto policy."""
  driveAndSave(policyNumber: String!, driverId: String!): DriveAndSave

  """Retrieve payment plan for a policy."""
  paymentPlan(policyNumber: String!): PaymentPlan

  """Retrieve API key details."""
  apiKey(keyId: String!): APIKey
}

type Mutation {
  """Initiate a new renters insurance policy application."""
  createRentersPolicy(input: RentersPolicyInput!): RentersPolicy!

  """Update policy details or coverage selections."""
  updatePolicy(policyNumber: String!, input: PolicyUpdateInput!): Policy!

  """Submit a first notice of loss to open a new claim."""
  fileClaim(input: ClaimInput!): Claim!

  """Update claim information."""
  updateClaim(claimNumber: String!, input: ClaimUpdateInput!): Claim!

  """Enroll a driver in the Drive and Save telematics program."""
  enrollDriveAndSave(policyNumber: String!, driverId: String!): DriveAndSave!

  """Add a vehicle to an existing auto policy."""
  addVehicle(policyNumber: String!, input: VehicleInput!): Vehicle!

  """Add a driver to an existing auto policy."""
  addDriver(policyNumber: String!, input: DriverInput!): Driver!

  """Update the payment plan for a policy."""
  setPaymentPlan(policyNumber: String!, input: PaymentPlanInput!): PaymentPlan!

  """Enroll in automatic premium payment."""
  enrollAutoPayment(policyNumber: String!, input: AutoPaymentInput!): AutoPayment!

  """Cancel a policy."""
  cancelPolicy(policyNumber: String!, reason: String!, effectiveDate: Date): Policy!
}
