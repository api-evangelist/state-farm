"""
State Farm GraphQL Schema
Conceptual schema for State Farm insurance products and partner API integrations.
Source: developer.statefarm.com, statefarm.com product documentation
"""

# ─── Scalars ───────────────────────────────────────────────────────────────────

scalar Date
scalar DateTime
scalar Decimal
scalar URL

# ─── Enums ─────────────────────────────────────────────────────────────────────

enum PolicyType {
  AUTO
  HOME
  RENTERS
  LIFE
  HEALTH
  BOAT
  FARM
  UMBRELLA
  BUSINESS
}

enum PolicyStatus {
  ACTIVE
  PENDING
  CANCELLED
  EXPIRED
  SUSPENDED
  IN_RENEWAL
}

enum ClaimStatusType {
  REPORTED
  ASSIGNED
  UNDER_INVESTIGATION
  ESTIMATE_PENDING
  REPAIR_IN_PROGRESS
  PAYMENT_ISSUED
  CLOSED
  REOPENED
}

enum PaymentFrequency {
  ANNUAL
  SEMI_ANNUAL
  QUARTERLY
  MONTHLY
}

enum VehicleUsage {
  PLEASURE
  COMMUTE
  BUSINESS
  RIDESHARE
  FARM
}

enum DriverRelationship {
  SELF
  SPOUSE
  CHILD
  PARENT
  OTHER_RELATIVE
  OTHER
}

enum CoverageType {
  LIABILITY
  COLLISION
  COMPREHENSIVE
  PIP
  UM
  UIM
  MED_PAY
  DWELLING
  PERSONAL_PROPERTY
  LOSS_OF_USE
  OTHER
}

enum PropertyType {
  SINGLE_FAMILY
  CONDO
  TOWNHOUSE
  MOBILE_HOME
  RENTAL
}

enum ConstructionType {
  FRAME
  MASONRY
  MASONRY_VENEER
  SUPERIOR
}

enum LifePolicyType {
  TERM
  WHOLE
  UNIVERSAL
  VARIABLE_UNIVERSAL
}

enum ClaimType {
  AUTO_COLLISION
  AUTO_COMPREHENSIVE
  AUTO_LIABILITY
  PROPERTY_FIRE
  PROPERTY_WATER
  PROPERTY_THEFT
  PROPERTY_WIND
  PROPERTY_OTHER
  LIABILITY
  MEDICAL
}

enum RepairStatus {
  SCHEDULED
  IN_PROGRESS
  SUPPLEMENT_REQUESTED
  COMPLETED
  CUSTOMER_DECLINED
}

enum TokenType {
  BEARER
}

# ─── Address ───────────────────────────────────────────────────────────────────

type Address {
  street1: String!
  street2: String
  city: String!
  state: String!
  zip: String!
  county: String
  country: String!
}

input AddressInput {
  street1: String!
  street2: String
  city: String!
  state: String!
  zip: String!
  county: String
  country: String
}

# ─── Money ─────────────────────────────────────────────────────────────────────

type Money {
  amount: Decimal!
  currency: String!
}

# ─── Policyholder and Insured ──────────────────────────────────────────────────

"""Primary named insured and account owner."""
type PolicyHolder {
  id: ID!
  firstName: String!
  lastName: String!
  middleName: String
  dateOfBirth: Date!
  email: String
  phone: String
  address: Address!
  policies: [Policy!]!
  agent: Agent
  accountCreated: DateTime!
  accountUpdated: DateTime!
}

"""Individual or entity formally named on the policy declarations page."""
type NamedInsured {
  id: ID!
  firstName: String!
  lastName: String!
  dateOfBirth: Date
  relationship: DriverRelationship!
  isPrimaryNamedInsured: Boolean!
}

"""Third party added to a policy as an insured or interested party."""
type AdditionalInsured {
  id: ID!
  name: String!
  address: Address
  interestType: String!
  loanNumber: String
  addedDate: Date!
}

# ─── Policy Base ───────────────────────────────────────────────────────────────

"""Base policy interface shared by all policy product types."""
interface Policy {
  id: ID!
  policyNumber: String!
  policyType: PolicyType!
  status: PolicyStatus!
  effectiveDate: Date!
  expirationDate: Date!
  policyHolder: PolicyHolder!
  namedInsureds: [NamedInsured!]!
  additionalInsureds: [AdditionalInsured!]
  currentTerm: PolicyTerm!
  endorsements: [Endorsement!]
  premium: Premium!
  agent: Agent
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Defined period of insurance coverage."""
type PolicyTerm {
  id: ID!
  termNumber: Int!
  startDate: Date!
  endDate: Date!
  termMonths: Int!
  premium: Premium!
  isCurrentTerm: Boolean!
}

"""Policy modification changing standard coverage terms."""
type Endorsement {
  id: ID!
  endorsementNumber: String!
  description: String!
  effectiveDate: Date!
  premiumImpact: Money!
  addedBy: String
}

"""Optional add-on benefit attached to a life or health policy."""
type PolicyRider {
  id: ID!
  riderType: String!
  description: String!
  faceAmount: Money
  premiumAmount: Money!
  effectiveDate: Date!
  expirationDate: Date
}

