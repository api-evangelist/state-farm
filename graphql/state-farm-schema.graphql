}

type PremiumDiscount {
  discountType: String!
  description: String!
  amount: Money!
  percentage: Decimal
}

type PremiumSurcharge {
  surchargeType: String!
  description: String!
  amount: Money!
}

"""Installment schedule for premium payment."""
type PaymentPlan {
  id: ID!
  policyNumber: String!
