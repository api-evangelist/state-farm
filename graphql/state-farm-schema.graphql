# ─── Coverage Types ─────────────────────────────────────────────────────────────

"""Base coverage type."""
interface Coverage {
  id: ID!
  coverageType: CoverageType!
  premiumContribution: Money!
  isActive: Boolean!
}

"""Auto-specific coverage container linking a vehicle to coverages."""
type AutoCoverage implements Coverage {
  id: ID!
  coverageType: CoverageType!
  premiumContribution: Money!
  isActive: Boolean!
  vehicle: Vehicle!
  liability: LiabilityCoverage
  collision: CollisionCoverage
  comprehensive: ComprehensiveCoverage
  pip: PIPCoverage
  uninsuredMotorist: UMCoverage
  underinsuredMotorist: UIMCoverage
  medPay: MedPayCoverage
}

"""Bodily injury and property damage liability coverage."""
type LiabilityCoverage implements Coverage {
  id: ID!
  coverageType: CoverageType!
  premiumContribution: Money!
  isActive: Boolean!
  limits: LiabilityLimit!
}

"""Collision coverage for vehicle damage from at-fault accidents."""
type CollisionCoverage implements Coverage {
  id: ID!
  coverageType: CoverageType!
  premiumContribution: Money!
  isActive: Boolean!
  deductible: Deductible!
}

"""Comprehensive coverage for non-collision vehicle damage."""
type ComprehensiveCoverage implements Coverage {
  id: ID!
  coverageType: CoverageType!
  premiumContribution: Money!
  isActive: Boolean!
  deductible: Deductible!
}

"""Personal Injury Protection for medical expenses regardless of fault."""
type PIPCoverage implements Coverage {
  id: ID!
  coverageType: CoverageType!
  premiumContribution: Money!
  isActive: Boolean!
  limitPerPerson: Money!
  workLossBenefit: Boolean!
  deductible: Deductible
}

"""Uninsured Motorist coverage."""
type UMCoverage implements Coverage {
  id: ID!
  coverageType: CoverageType!
  premiumContribution: Money!
  isActive: Boolean!
  limits: LiabilityLimit!
  propertyDamage: Boolean!
}

"""Underinsured Motorist coverage."""
type UIMCoverage implements Coverage {
  id: ID!
  coverageType: CoverageType!
  premiumContribution: Money!
  isActive: Boolean!
  limits: LiabilityLimit!
}

"""Medical Payments coverage."""
type MedPayCoverage implements Coverage {
  id: ID!
  coverageType: CoverageType!
  premiumContribution: Money!
  isActive: Boolean!
  limitPerPerson: Money!
}

"""Homeowners coverage container."""
type HomeCoverage implements Coverage {
  id: ID!
  coverageType: CoverageType!
  premiumContribution: Money!
  isActive: Boolean!
  dwelling: DwellingCoverage!
  personalProperty: PersonalPropertyCoverage!
  lossOfUse: LossOfUseCoverage!
  liability: LiabilityCoverage!
  medPay: MedPayCoverage
}

"""Coverage for the physical structure of the insured home."""
type DwellingCoverage implements Coverage {
  id: ID!
  coverageType: CoverageType!
  premiumContribution: Money!
  isActive: Boolean!
  dwellingLimit: Money!
  otherStructuresLimit: Money!
  replacementCost: Boolean!
  extendedReplacementCostPercent: Int
}

"""Coverage for personal belongings."""
type PersonalPropertyCoverage implements Coverage {
  id: ID!
  coverageType: CoverageType!
  premiumContribution: Money!
  isActive: Boolean!
  personalPropertyLimit: Money!
  replacementCost: Boolean!
  specialLimits: [SpecialPropertyLimit!]
}

type SpecialPropertyLimit {
  category: String!
  limit: Money!
}

"""Coverage for additional living expenses when home is uninhabitable."""
type LossOfUseCoverage implements Coverage {
  id: ID!
  coverageType: CoverageType!
  premiumContribution: Money!
  isActive: Boolean!
  limit: Money!
  maxMonths: Int
}

# ─── Financial Types ────────────────────────────────────────────────────────────

"""Structured liability limit with per-person, per-occurrence, and aggregate."""
